<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gofer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
        h1 { margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1d4ed8; }
        h2 { margin-top: 2rem; margin-bottom: 0.5rem; font-size: 1.1rem; }
        ul { list-style: none; }
        li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <h1>Gofer</h1>
    <p>Webhook inspection service</p>
    <button id="create-btn">Create a Bin</button>
    <h2>Recent Bins</h2>
    <ul id="bins-list"><li class="empty">No recent bins</li></ul>
    <script>
        const btn = document.getElementById('create-btn');
        const list = document.getElementById('bins-list');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Creating\u2026';
            try {
                const r = await fetch('/api/bins', { method: 'POST' });
                if (!r.ok) throw new Error("failed")
                const bin = await r.json();
                const bins = JSON.parse(localStorage.getItem('gofer_bins') || '[]');
                bins.unshift({ slug: bin.slug, created_at: bin.created_at, expires_at: bin.expires_at });
                localStorage.setItem('gofer_bins', JSON.stringify(bins.slice(0, 20)));
                window.location.href = '/bins/' + bin.slug;
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Create a Bin';
            }
        });

        const now = new Date();
        const bins = JSON.parse(localStorage.getItem('gofer_bins') || '[]')
            .filter(b => !b.expires_at || new Date(b.expires_at) > now);
        localStorage.setItem('gofer_bins', JSON.stringify(bins));
        if (bins.length > 0) {
            list.innerHTML = '';
            bins.forEach(b => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '/bins/' + b.slug;
                a.textContent = b.slug;
                li.appendChild(a);
                li.appendChild(document.createTextNode(' \u2014 ' + new Date(b.created_at).toLocaleString()));
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
