<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bin {{.Slug}} — Gofer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { margin-bottom: 1rem; }
        .meta { color: #666; margin-bottom: 1rem; font-size: 0.9rem; }
        .capture-url { display: flex; align-items: center; gap: 0.5rem; background: #f5f5f5; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
        .capture-url code { flex: 1; word-break: break-all; }
        .copy-btn { padding: 0.25rem 0.5rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
        .copy-btn:hover { background: #1d4ed8; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; overflow-x: auto; font-size: 0.85rem; }
        h2 { margin-bottom: 0.75rem; }
        .request { border: 1px solid #e5e7eb; border-radius: 4px; margin-bottom: 0.5rem; }
        .summary { padding: 0.5rem 0.75rem; cursor: pointer; font-family: monospace; font-size: 0.85rem; display: flex; gap: 0.75rem; }
        .summary:hover { background: #f9fafb; }
        .method { font-weight: bold; min-width: 4ch; }
        .detail { display: none; padding: 0.75rem; border-top: 1px solid #e5e7eb; background: #fafafa; font-size: 0.85rem; }
        .detail pre { margin: 0.5rem 0; }
        .detail h4 { margin: 0.75rem 0 0.25rem; }
        .detail h4:first-child { margin-top: 0; }
        .empty { color: #999; font-style: italic; }
        .new { animation: highlight 2s ease-out; }
        @keyframes highlight { from { background: #dbeafe; } to { background: transparent; } }
    </style>
</head>
<body>
    <h1><a href="/">Gofer</a> / {{.Slug}}</h1>
    <p class="meta">Created: {{.CreatedAt}} · Expires: {{.ExpiresAt}}</p>
    <div class="capture-url">
        <code id="url">{{.CaptureURL}}</code>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('url').textContent)">Copy</button>
    </div>
    <pre>{{.CurlExample}}</pre>
    <h2>Captured Requests</h2>
    <div id="requests">
        {{range .Requests}}
        <div class="request" data-id="{{.ID}}">
            <div class="summary" onclick="toggle(this)">
                <span class="method">{{.Method}}</span>
                <span>{{.Path}}</span>
                <span>{{.ContentType}}</span>
                <span>{{.BodySize}}B</span>
                <span>{{.CapturedAt}}</span>
            </div>
            <div class="detail"></div>
        </div>
        {{else}}
        <p class="empty">No requests yet — send one!</p>
        {{end}}
    </div>
    <script>
        const sse = new EventSource('{{.SSEEndpoint}}');
        sse.onmessage = (e) => {
            const r = JSON.parse(e.data);
            const empty = document.querySelector('.empty');
            if (empty) empty.remove();
            const div = document.createElement('div');
            div.className = 'request new';
            div.dataset.id = r.id;
            const summary = document.createElement('div');
            summary.className = 'summary';
            summary.onclick = function() { toggle(this); };
            [{cls:'method',val:r.method}, {val:r.path}, {val:r.content_type}, {val:r.body_size+'B'}, {val:r.captured_at}].forEach(item => {
                const span = document.createElement('span');
                if (item.cls) span.className = item.cls;
                span.textContent = item.val;
                summary.appendChild(span);
            });
            const detail = document.createElement('div');
            detail.className = 'detail';
            div.appendChild(summary);
            div.appendChild(detail);
            document.getElementById('requests').prepend(div);
        };

        sse.onerror = () => {
            if (sse.readyState === EventSource.CLOSED) {
                const p = document.createElement('p');
                p.className = 'empty';
                p.textContent = 'Live updates disconnected';
                document.getElementById('requests').prepend(p);
            }
        }

        async function toggle(el) {
            const detail = el.nextElementSibling;
            if (detail.style.display === 'block') { detail.style.display = 'none'; return; }
            if (!detail.dataset.loaded) {
                try {
                    const id = el.parentElement.dataset.id;
                    const res = await fetch('/api/requests/' + id);
                    if (!res.ok) throw new Error('failed');
                    const d = await res.json();
                    detail.innerHTML = '';
                    const addSection = (title, content) => {
                        const h = document.createElement('h4');
                        h.textContent = title;
                        detail.appendChild(h);
                        const pre = document.createElement('pre');
                        pre.textContent = content;
                        detail.appendChild(pre);
                    };
                    addSection('Headers', Object.entries(d.headers||{}).map(([k,v]) => k+': '+v.join(', ')).join('\n'));
                    if (d.query_params && Object.keys(d.query_params).length)
                        addSection('Query', Object.entries(d.query_params).map(([k,v]) => k+'='+v.join(',')).join('\n'));
                    addSection('Body', d.body || '(empty)');
                    detail.dataset.loaded = '1';
                } catch (e) {
                    detail.textContent = 'Failed to load request details.';
                }
            }
            detail.style.display = 'block';
        }
    </script>
</body>
</html>
