apiVersion: apps/v1
kind: Deployment
metadata:
  name: gofer
  namespace: gofer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gofer
  template:
    metadata:
      labels:
        app: gofer
    spec:
      containers:
        - name: gofer
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: VERSION
              value: VERSION_PLACEHOLDER
            - name: REPO_LOCATION
              value: /data/gofer.db
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.otel-collector.svc.cluster.local:4318
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gofer-data
